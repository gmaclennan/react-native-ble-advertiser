# Smoke test — works on both emulator and real device.
#
# On emulator (no Bluetooth): startAdvertising() rejects, the error is
# displayed, and the GATT server path is never reached. The test still
# proves the native module loaded and its methods are callable across
# the bridge (they return errors, not crashes).
#
# On a real device: use smoke-test-device.yaml instead, which also
# asserts that advertising and the GATT server started successfully.
#
# Run:
#   cd example && npx expo run:android
#   maestro test .maestro/smoke-test.yaml
appId: app.comapeo.bleadvertiser.example
---
- launchApp:
    clearState: true

# Start screen renders — native module loaded without crash
- assertVisible: "BLE Advertiser"

# Enter a name and navigate to Discovery
- tapOn: "Your name"
- inputText: "smoke"
- hideKeyboard
- tapOn: "Start"

# Handle Bluetooth permission dialog if shown
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Discovery screen rendered — init() ran, native methods were called,
# and the app didn't crash (even if BLE is unavailable).
- assertVisible:
    text: "Discovery"
    timeout: 10000
