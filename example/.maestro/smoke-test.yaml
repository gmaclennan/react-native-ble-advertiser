# Smoke test that runs on an emulator (no Bluetooth hardware required).
#
# Verifies:
#   - Native module compiles, links, and loads (app doesn't crash on launch)
#   - JS/native bridge is wired correctly (isSupported, startAdvertising,
#     startGattServer are all callable — they return errors, not crashes)
#   - Permission request flow works
#   - Discovery screen renders despite BLE being unavailable
#
# This catches the most common regressions: linking errors, missing classes,
# method signature mismatches between JS and native.
#
# Run:
#   cd example && npx expo run:android  # build for emulator
#   maestro test .maestro/smoke-test.yaml
appId: app.comapeo.bleadvertiser.example
---
- launchApp:
    clearState: true

# Start screen renders — native module loaded without crash
- assertVisible: "BLE Advertiser"

# Enter a name and navigate to Discovery
- tapOn: "Your name"
- inputText: "smoke"
- hideKeyboard
- tapOn: "Start"

# Handle Bluetooth permission dialog (still shown on emulator)
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Discovery screen rendered — the native module methods were called
# (they returned errors, but didn't crash) and the app recovered gracefully.
- assertVisible:
    text: "Discovery"
    timeout: 10000
